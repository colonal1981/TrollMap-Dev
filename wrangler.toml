name = "trollmap-worker"
main = "trollmap-worker.js"
compatibility_date = "2024-07-04"
compatibility_flags = ["nodejs_compat"]

# ── R2 Bucket for chartpacks + lake research profiles ──────────────
# bucket_name must match your actual R2 bucket in Cloudflare dashboard.
# Check: Dashboard -> R2 -> Buckets
[[r2_buckets]]
binding = "R2_TROLLMAP_CHARTPACKS"
bucket_name = "trollmap-chartpacks"

# ── D1 Database for cloud sync ─────────────────────────────────────
# database_id must match your D1 id. Find via: npx wrangler d1 list
# If you don't use sync, you can comment this out — but research R2 still needs R2 binding.
[[d1_databases]]
binding = "DB"
database_name = "trollmap-sync"
# REPLACE this placeholder with your real D1 id, or delete this block if you don't have D1 yet
database_id = "00000000-0000-0000-0000-000000000000"

[vars]
# SYNC_TOKEN must match your Pages env var SYNC_TOKEN — set via Cloudflare Pages dashboard,
# or override with: npx wrangler secret put SYNC_TOKEN
SYNC_TOKEN = "trollmap-sync-token"

# Secrets (set via wrangler, not in this file):
# npx wrangler secret put GEMINI_API_KEY
# npx wrangler secret put GROQ_API_KEY
# npx wrangler secret put OPENROUTER_API_KEY
# npx wrangler secret put CEREBRAS_API_KEY
# npx wrangler secret put TAVILY_API_KEY
# npx wrangler secret put GOOGLE_SEARCH_API_KEY
# npx wrangler secret put GOOGLE_SEARCH_CX

